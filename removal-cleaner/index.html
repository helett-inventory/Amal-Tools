<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Helett Removal Parser</title>
<style>
body{font-family:Arial;margin:20px;background:#f4f4f4}
textarea{width:100%;height:250px;font-family:monospace;font-size:13px}
table{border-collapse:collapse;width:100%;margin-top:15px;background:#fff}
th,td{border:1px solid #ccc;padding:6px 10px;text-align:left}
th{background:#222;color:#fff}
button{padding:8px 16px;margin-top:10px;cursor:pointer;font-size:14px}
#status{color:green;margin-left:10px}
</style>
</head>
<body>

<h2>Helett Removal Order Parser</h2>
<textarea id="input" placeholder="Paste full removal order page here..." onkeydown="if(event.key==='Enter'){event.preventDefault();parseData();}"></textarea><br>
<button onclick="parseData()">Parse</button>
<button onclick="copyTable()">Copy to Clipboard</button>
<span id="status"></span>

<table id="out">
<thead><tr><th>SKU</th><th>ORDER ID</th><th>UNITS CREATED</th><th>REMOVAL DATE</th><th>Disposition</th></tr></thead>
<tbody id="body"></tbody>
</table>

<script>
function parseData(){
  const text = document.getElementById('input').value;

  const orderIdMatch = text.match(/Removal order ID:\s*(\S+)/);
  const orderId = orderIdMatch ? orderIdMatch[1].trim() : '';

  const dateMatch = text.match(/Date Submitted:\s*(.+?(?:AM|PM))/);
  const removalDate = dateMatch ? dateMatch[1].trim() : '';

  const chunks = text.split(/(?=Merchant SKU:)/g).filter(c=>c.trim().length>0);

  let rows = [];
  chunks.forEach(chunk=>{
    const skuMatch = chunk.match(/Merchant SKU:\s*(.+)/);
    if(!skuMatch) return;
    const sku = skuMatch[1].trim().replace(/\s+(FBA|MFN)$/i, '').trim();

    const dispMatch = chunk.match(/Disposition:\s*(\S+)/);
    const disposition = dispMatch ? dispMatch[1].trim() : '';

    const lines = chunk.split('\n').map(l=>l.trim());
    let condLineIdx = -1;
    for(let i=0;i<lines.length;i++){
      if(lines[i].startsWith('Condition:')){ condLineIdx = i; break; }
    }
    let qty = '';
    if(condLineIdx !== -1){
      for(let j=condLineIdx+1;j<lines.length;j++){
        if(lines[j] === '') continue;
        if(/^\d+$/.test(lines[j])){ qty = lines[j]; }
        break;
      }
    }
    rows.push({sku, qty, disposition});
  });

  const body = document.getElementById('body');
  body.innerHTML = '';
  rows.forEach(r=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${r.sku}</td><td>${orderId}</td><td>${r.qty}</td><td>${removalDate}</td><td>${r.disposition}</td>`;
    body.appendChild(tr);
  });
  document.getElementById('status').innerText = rows.length + ' rows parsed.';
}

function copyTable(){
  const rows = document.querySelectorAll('#body tr');
  let text = '';
  rows.forEach(row=>{
    const cells = row.querySelectorAll('th,td');
    text += Array.from(cells).map(c=>c.innerText).join('\t') + '\n';
  });
  navigator.clipboard.writeText(text).then(()=>{
    document.getElementById('status').innerText = 'Copied! Paste into spreadsheet.';
  });
}
</script>

</body>
</html>
